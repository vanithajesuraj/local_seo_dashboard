<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Local SEO Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2ff;
  padding: 20px;
}

h1 { margin-bottom: 10px; }

.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

select, input {
  padding: 7px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.kpi {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.kpi h2 { margin: 0; }

.insights {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.chart-container {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
  border-radius: 12px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

tr:hover { background: #f9f9ff; }

.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.high { background: #fee2e2; color: #b91c1c; }
.improve { background: #dcfce7; color: #166534; }
.decline { background: #fff7ed; color: #9a3412; }
</style>
</head>

<body>

<h1>🚀Local SEO Dashboard</h1>

<!-- FILTERS -->
<div class="filters">
<input type="text" id="search" placeholder="Search..." oninput="applyFilters()">
<select id="dm" onchange="applyFilters()"><option value="">DM</option></select>
<select id="risk" onchange="applyFilters()"><option value="">Risk</option></select>
<select id="rank" onchange="applyFilters()">
<option value="">Rank</option>
<option>Top 1</option>
<option>Top 3</option>
<option>Top 5</option>
<option>6-10</option>
<option>10+</option>
<option>NR</option>
</select>
<select id="trend" onchange="applyFilters()">
<option value="">Trend</option>
<option>Improving</option>
<option>Declining</option>
<option>Stable</option>
</select>
<select id="deadline" onchange="applyFilters()">
<option value="">Deadline</option>
<option>Overdue</option>
<option>0-3</option>
<option>Safe</option>
</select>
</div>

<!-- KPIs -->
<div class="kpis" id="kpis"></div>

<!-- INSIGHTS -->
<div class="insights" id="insights"></div>

<!-- CHARTS -->
<div class="chart-container">
<canvas id="rankChart"></canvas>
</div>

<div class="chart-container">
<canvas id="riskChart"></canvas>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Branch</th>
<th>Keyword</th>
<th>Rank</th>
<th>Trend</th>
<th>Risk</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let RAW = [];
let rankChart, riskChart;

// LOAD DATA
async function loadData() {
  const res = await fetch("https://opensheet.elk.sh/1CbMzqrP8jXOz5wrV3NiNXkwJ9JrQzRPF0OBqTYVdqxQ/Sheet1");
  RAW = await res.json();
  initFilters();
  applyFilters();
}
loadData();

// INIT FILTERS
function initFilters() {
  const fields = ["DM","Risk Assessment"];
  fields.forEach(f => {
    const el = document.getElementById(f.split(" ")[0].toLowerCase());
    const vals = [...new Set(RAW.map(r => r[f]).filter(Boolean))];
    vals.forEach(v=>{
      const o=document.createElement("option");
      o.value=v;o.textContent=v;
      el.appendChild(o);
    });
  });
}

// ENRICH
function enrich(data){
  return data.map(r=>{
    const curr=parseInt(r["Feb 2026"])||999;
    const prev=parseInt(r["Jan 2026"])||999;
    const months=parseInt(r["No of months left before deadline"]);

    let rank="NR";
    if(curr===1) rank="Top 1";
    else if(curr<=3) rank="Top 3";
    else if(curr<=5) rank="Top 5";
    else if(curr<=10) rank="6-10";
    else if(curr<999) rank="10+";

    let trend="Stable";
    if(curr<prev) trend="Improving";
    else if(curr>prev) trend="Declining";

    let deadline="Safe";
    if(months<0) deadline="Overdue";
    else if(months<=3) deadline="0-3";

    return {...r,rank,trend,deadline};
  });
}

// FILTER
function applyFilters(){
  const s=document.getElementById("search").value.toLowerCase();
  const dm=document.getElementById("dm").value;
  const risk=document.getElementById("risk").value;
  const rank=document.getElementById("rank").value;
  const trend=document.getElementById("trend").value;
  const deadline=document.getElementById("deadline").value;

  const data=enrich(RAW).filter(r=>
    (!s||JSON.stringify(r).toLowerCase().includes(s)) &&
    (!dm||r["DM"]===dm) &&
    (!risk||r["Risk Assessment"]===risk) &&
    (!rank||r.rank===rank) &&
    (!trend||r.trend===trend) &&
    (!deadline||r.deadline===deadline)
  );

  buildKPIs(data);
  buildInsights(data);
  buildCharts(data);
  renderTable(data);
}

// KPIs
function buildKPIs(data){
  document.getElementById("kpis").innerHTML=`
  <div class="kpi"><h2>${data.length}</h2>Total</div>
  <div class="kpi"><h2>${data.filter(r=>r.rank==="Top 3"||r.rank==="Top 1").length}</h2>Top 3</div>
  <div class="kpi"><h2>${data.filter(r=>r.trend==="Improving").length}</h2>Improving</div>
  <div class="kpi"><h2>${data.filter(r=>r["Risk Assessment"]==="High").length}</h2>High Risk</div>
  `;
}

// INSIGHTS
function buildInsights(data){
  let insights=[];
  if(data.filter(r=>r.trend==="Declining").length>3)
    insights.push("📉 Rankings dropping — action needed");
  if(data.filter(r=>r.deadline==="Overdue").length>3)
    insights.push("⚠️ Multiple overdue projects");
  if(data.filter(r=>r.rank==="Top 3").length>5)
    insights.push("🚀 Strong Top 3 performance");

  document.getElementById("insights").innerHTML =
    insights.length ? insights.join("<br>") : "✅ Performance is stable";
}

// CHARTS
function buildCharts(data){
  const rankCounts = {
    "Top 3": data.filter(r=>r.rank==="Top 3"||r.rank==="Top 1").length,
    "Top 5": data.filter(r=>r.rank==="Top 5").length,
    "10+": data.filter(r=>r.rank==="10+").length
  };

  const riskCounts = {
    High: data.filter(r=>r["Risk Assessment"]==="High").length,
    Low: data.filter(r=>r["Risk Assessment"]!=="High").length
  };

  if(rankChart) rankChart.destroy();
  rankChart=new Chart(document.getElementById("rankChart"),{
    type:"bar",
    data:{labels:Object.keys(rankCounts),datasets:[{data:Object.values(rankCounts)}]}
  });

  if(riskChart) riskChart.destroy();
  riskChart=new Chart(document.getElementById("riskChart"),{
    type:"doughnut",
    data:{labels:Object.keys(riskCounts),datasets:[{data:Object.values(riskCounts)}]}
  });
}

// TABLE
function renderTable(data){
  const t=document.getElementById("table");
  t.innerHTML="";
  data.forEach(r=>{
    t.innerHTML+=`
    <tr>
      <td>${r["Branch"]}</td>
      <td>${r["Keyword"]}</td>
      <td>${r.rank}</td>
      <td><span class="badge ${r.trend==='Improving'?'improve':'decline'}">${r.trend}</span></td>
      <td><span class="badge ${r["Risk Assessment"]==='High'?'high':''}">${r["Risk Assessment"]}</span></td>
    </tr>`;
  });
}
</script>

</body>
</html>
